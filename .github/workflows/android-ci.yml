name: Android CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      distribute_debug:
        description: Upload the debug APK to Firebase App Distribution
        required: true
        type: boolean
        default: false
      tester_groups:
        description: Firebase tester groups
        required: false
        type: string
        default: testers

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

jobs:
  build:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Run static analysis
        run: ./gradlew --no-daemon detekt

      - name: Upload detekt reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: |
            **/build/reports/detekt/
          if-no-files-found: ignore
          retention-days: 7

      - name: Run unit tests
        run: ./gradlew --no-daemon test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Run Android lint
        run: ./gradlew --no-daemon :data:lintDebug :presentation:lintDebug :app:lintDebug

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            data/build/reports/
            presentation/build/reports/
            app/build/reports/
          if-no-files-found: ignore
          retention-days: 7

      - name: Build debug APK
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "Missing RELEASE_KEYSTORE_BASE64 secret"
            exit 1
          fi
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build release bundle
        run: ./gradlew --no-daemon :app:bundleRelease
        env:
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_EXCHANGE_BANNER_ID: ${{ secrets.ADMOB_EXCHANGE_BANNER_ID }}
          ADMOB_FAVORITE_BANNER_ID: ${{ secrets.ADMOB_FAVORITE_BANNER_ID }}
          ADMOB_SETTINGS_BANNER_ID: ${{ secrets.ADMOB_SETTINGS_BANNER_ID }}
          RELEASE_KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 7

  firebase_app_distribution:
    name: Firebase App Distribution
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.distribute_debug }}

    steps:
      - name: Download debug APK
        uses: actions/download-artifact@v4
        with:
          name: debug-apk
          path: artifacts

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: ${{ inputs.tester_groups }}
          file: artifacts/app-debug.apk
